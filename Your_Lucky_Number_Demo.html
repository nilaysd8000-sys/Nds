<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Lucky Number</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef2f7}
header{padding:16px;text-align:center;background:#1e3a8a;color:#fff}
.wrap{display:flex;min-height:calc(100vh - 64px)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.panel{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.15);text-align:center}
#num{font-size:110px;font-weight:bold}
aside{width:320px;background:#111827;color:#fff;padding:16px;overflow:auto}
li{margin-bottom:8px}
@media(max-width:800px){.wrap{flex-direction:column}aside{width:auto}}
</style>
</head>
<body>
<header><h1>Your Lucky Number</h1><div>Guess the next number and have fun with friends!</div></header>
<div class="wrap">
<main><div class="panel">
<div id="num">-</div>
<div id="clock"></div>
<div id="count"></div>
</div></main>
<aside>
<h2>History</h2>
<ol id="history"></ol>
</aside>
</div>
<script>
const historyList=[];
function updateClock(){
 const d=new Date();
 document.getElementById("clock").textContent="Current time: "+d.toLocaleString();
 const p=300000;
 const next=Math.ceil(d.getTime()/p)*p;
 let rem=Math.floor((next-d.getTime())/1000);
 document.getElementById("count").textContent="Next draw in "+Math.floor(rem/60)+"m "+(rem%60)+"s";
}
function draw(){
 const n=Math.floor(Math.random()*10);
 document.getElementById("num").textContent=n;
 const stamp=new Date().toLocaleString();
 historyList.unshift(stamp+" — "+n);
 historyList.splice(20);
 document.getElementById("history").innerHTML=historyList.map(x=>"<li>"+x+"</li>").join("");
}
draw();
updateClock();
setInterval(updateClock,1000);
setInterval(draw,300000);
</script>
</body>
</html>
